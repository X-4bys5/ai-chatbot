<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusAI — Intelligent Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #4fd1c5;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --user-bubble: #1e1b4b;
      --ai-bubble: #111118;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #chat-window {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .avatar.ai {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-family: 'Syne', sans-serif;
    }

    .avatar.user {
      background: var(--user-bubble);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 12px;
      line-height: 1.7;
      font-size: 0.875rem;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.ai {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(124,106,247,0.3);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 17px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .welcome {
      align-self: center;
      text-align: center;
      padding: 60px 20px;
      max-width: 440px;
    }

    .welcome-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.8;
    }

    .input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
    }

    .input-wrapper {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.6;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; fill: white; }

    .hint {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Nexus<span>AI</span></div>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Model online
  </div>
  <button class="reset-btn" onclick="resetChat()">↺ New chat</button>
</header>

<div id="chat-window">
  <div class="welcome" id="welcome-msg">
    <div class="welcome-icon">✦</div>
    <h2>What can I help with?</h2>
    <p>Powered by Gemini. Ask me anything — code, ideas, analysis, or just a conversation.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const sessionId = 'session_' + Math.random().toString(36).slice(2);
  const chatWindow = document.getElementById('chat-window');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function removeWelcome() {
    const w = document.getElementById('welcome-msg');
    if (w) w.remove();
  }

  function appendMessage(role, text) {
    removeWelcome();
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '✦' : 'U';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function showTyping() {
    removeWelcome();
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = '✦';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(avatar);
    row.appendChild(indicator);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendMessage('ai', '⚠ ' + data.error);
      } else {
        appendMessage('ai', data.response);
      }
    } catch {
      removeTyping();
      appendMessage('ai', '⚠ Could not reach the server. Make sure the app is running.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function resetChat() {
    await fetch('/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    chatWindow.innerHTML = `
      <div class="welcome" id="welcome-msg">
        <div class="welcome-icon">✦</div>
        <h2>What can I help with?</h2>
        <p>Powered by Gemini. Ask me anything — code, ideas, analysis, or just a conversation.</p>
      </div>`;
  }
</script>
</body>
</html>
